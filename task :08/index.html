<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book - Cooking App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .recipe-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .recipe-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .difficulty-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ingredient-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-6">
                <div class="flex items-center">
                    <i class="fas fa-utensils text-orange-500 text-2xl mr-3"></i>
                    <h1 class="text-3xl font-bold text-gray-900">Recipe Book</h1>
                </div>
                <button onclick="openAddRecipeModal()" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg flex items-center">
                    <i class="fas fa-plus mr-2"></i>
                    Add Recipe
                </button>
            </div>
        </div>
    </header>

    <!-- Search and Filter Section -->
    <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="bg-white rounded-lg shadow p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="md:col-span-2">
                    <div class="relative">
                        <input type="text" id="searchInput" placeholder="Search recipes..." 
                               class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                        <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    </div>
                </div>
                <div>
                    <select id="difficultyFilter" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                        <option value="">All Difficulties</option>
                        <option value="Easy">Easy</option>
                        <option value="Medium">Medium</option>
                        <option value="Hard">Hard</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Recipes Grid -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-12">
        <div id="recipesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Recipe cards will be dynamically inserted here -->
        </div>
        
        <div id="noRecipes" class="text-center py-12 hidden">
            <i class="fas fa-cookie-bite text-6xl text-gray-300 mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-600 mb-2">No recipes found</h3>
            <p class="text-gray-500">Start by adding your first recipe!</p>
        </div>
    </main>

    <!-- Recipe Detail Modal -->
    <div id="recipeModal" class="modal">
        <div class="bg-white rounded-lg max-w-4xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-start mb-4">
                    <h2 id="modalTitle" class="text-2xl font-bold text-gray-900"></h2>
                    <button onclick="closeRecipeModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <div id="modalContent" class="space-y-6">
                    <!-- Modal content will be dynamically inserted -->
                </div>
            </div>
        </div>
    </div>

    <!-- Add/Edit Recipe Modal -->
    <div id="addRecipeModal" class="modal">
        <div class="bg-white rounded-lg max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 id="formTitle" class="text-2xl font-bold text-gray-900">Add New Recipe</h2>
                    <button onclick="closeAddRecipeModal()" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <form id="recipeForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Recipe Title</label>
                        <input type="text" id="recipeTitle" required class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="recipeDescription" required rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"></textarea>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Prep Time</label>
                            <input type="text" id="prepTime" placeholder="e.g., 15 mins" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Cook Time</label>
                            <input type="text" id="cookTime" placeholder="e.g., 30 mins" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Servings</label>
                            <input type="number" id="servings" min="1" value="1" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Difficulty</label>
                            <select id="difficulty" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent">
                                <option value="Easy">Easy</option>
                                <option value="Medium">Medium</option>
                                <option value="Hard">Hard</option>
                            </select>
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Ingredients</label>
                        <div id="ingredientsList" class="space-y-2 mb-2">
                            <!-- Ingredients will be added here -->
                        </div>
                        <button type="button" onclick="addIngredientField()" class="text-orange-500 hover:text-orange-600 text-sm">
                            <i class="fas fa-plus mr-1"></i> Add Ingredient
                        </button>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Instructions</label>
                        <textarea id="instructions" required rows="5" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent"></textarea>
                    </div>
                    
                    <div class="flex justify-end space-x-3">
                        <button type="button" onclick="closeAddRecipeModal()" class="px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                            Cancel
                        </button>
                        <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white px-4 py-2 rounded-lg">
                            Save Recipe
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let recipes = [];
        let currentEditingRecipe = null;

        // Initialize the app
        document.addEventListener('DOMContentLoaded', function() {
            loadRecipes();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', filterRecipes);
            document.getElementById('difficultyFilter').addEventListener('change', filterRecipes);
            document.getElementById('recipeForm').addEventListener('submit', handleRecipeSubmit);
        }

        async function loadRecipes() {
            try {
                const response = await fetch('/api/recipes');
                recipes = await response.json();
                displayRecipes(recipes);
            } catch (error) {
                console.error('Error loading recipes:', error);
            }
        }

        function displayRecipes(recipesToDisplay) {
            const grid = document.getElementById('recipesGrid');
            const noRecipes = document.getElementById('noRecipes');
            
            if (recipesToDisplay.length === 0) {
                grid.innerHTML = '';
                noRecipes.classList.remove('hidden');
                return;
            }
            
            noRecipes.classList.add('hidden');
            grid.innerHTML = recipesToDisplay.map(recipe => `
                <div class="recipe-card bg-white rounded-lg shadow-md overflow-hidden cursor-pointer" onclick="showRecipeDetail(${recipe.id})">
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-semibold text-gray-900">${recipe.title}</h3>
                            <span class="difficulty-badge ${getDifficultyColor(recipe.difficulty)} text-white">
                                ${recipe.difficulty}
                            </span>
                        </div>
                        <p class="text-gray-600 mb-4 line-clamp-3">${recipe.description}</p>
                        
                        <div class="flex items-center text-sm text-gray-500 space-x-4 mb-4">
                            ${recipe.prep_time ? `<span><i class="fas fa-clock mr-1"></i>${recipe.prep_time}</span>` : ''}
                            ${recipe.cook_time ? `<span><i class="fas fa-fire mr-1"></i>${recipe.cook_time}</span>` : ''}
                            <span><i class="fas fa-users mr-1"></i>${recipe.servings} servings</span>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-gray-500">
                                <i class="fas fa-list mr-1"></i>${recipe.ingredients.length} ingredients
                            </span>
                            <div class="flex space-x-2">
                                <button onclick="event.stopPropagation(); editRecipe(${recipe.id})" class="text-blue-500 hover:text-blue-700">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button onclick="event.stopPropagation(); deleteRecipe(${recipe.id})" class="text-red-500 hover:text-red-700">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getDifficultyColor(difficulty) {
            switch(difficulty) {
                case 'Easy': return 'bg-green-500';
                case 'Medium': return 'bg-yellow-500';
                case 'Hard': return 'bg-red-500';
                default: return 'bg-gray-500';
            }
        }

        function filterRecipes() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const difficulty = document.getElementById('difficultyFilter').value;
            
            const filtered = recipes.filter(recipe => {
                const matchesSearch = recipe.title.toLowerCase().includes(searchTerm) ||
                                    recipe.description.toLowerCase().includes(searchTerm) ||
                                    recipe.instructions.toLowerCase().includes(searchTerm);
                const matchesDifficulty = !difficulty || recipe.difficulty === difficulty;
                
                return matchesSearch && matchesDifficulty;
            });
            
            displayRecipes(filtered);
        }

        async function showRecipeDetail(recipeId) {
            try {
                const response = await fetch(`/api/recipes/${recipeId}`);
                const recipe = await response.json();
                
                document.getElementById('modalTitle').textContent = recipe.title;
                document.getElementById('modalContent').innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 mb-3">Recipe Details</h3>
                            <div class="space-y-2 text-sm">
                                <p><strong>Prep Time:</strong> ${recipe.prep_time || 'Not specified'}</p>
                                <p><strong>Cook Time:</strong> ${recipe.cook_time || 'Not specified'}</p>
                                <p><strong>Servings:</strong> ${recipe.servings}</p>
                                <p><strong>Difficulty:</strong> <span class="difficulty-badge ${getDifficultyColor(recipe.difficulty)} text-white">${recipe.difficulty}</span></p>
                            </div>
                        </div>
                        
                        <div>
                            <h3 class="text-lg font-semibold text-gray-900 mb-3">Ingredients</h3>
                            <div class="space-y-1">
                                ${recipe.ingredients.map(ing => `
                                    <div class="ingredient-item">
                                        <span>${ing.name}</span>
                                        <span class="text-gray-500">${ing.quantity} ${ing.unit}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Description</h3>
                        <p class="text-gray-600">${recipe.description}</p>
                    </div>
                    
                    <div>
                        <h3 class="text-lg font-semibold text-gray-900 mb-3">Instructions</h3>
                        <div class="prose max-w-none">
                            <p class="text-gray-600 whitespace-pre-line">${recipe.instructions}</p>
                        </div>
                    </div>
                `;
                
                document.getElementById('recipeModal').classList.add('active');
            } catch (error) {
                console.error('Error loading recipe details:', error);
            }
        }

        function closeRecipeModal() {
            document.getElementById('recipeModal').classList.remove('active');
        }

        function openAddRecipeModal() {
            currentEditingRecipe = null;
            document.getElementById('formTitle').textContent = 'Add New Recipe';
            document.getElementById('recipeForm').reset();
            document.getElementById('ingredientsList').innerHTML = '';
            addIngredientField();
            document.getElementById('addRecipeModal').classList.add('active');
        }

        async function editRecipe(recipeId) {
            try {
                const response = await fetch(`/api/recipes/${recipeId}`);
                const recipe = await response.json();
                
                currentEditingRecipe = recipe;
                document.getElementById('formTitle').textContent = 'Edit Recipe';
                document.getElementById('recipeTitle').value = recipe.title;
                document.getElementById('recipeDescription').value = recipe.description;
                document.getElementById('prepTime').value = recipe.prep_time || '';
                document.getElementById('cookTime').value = recipe.cook_time || '';
                document.getElementById('servings').value = recipe.servings;
                document.getElementById('difficulty').value = recipe.difficulty;
                document.getElementById('instructions').value = recipe.instructions;
                
                // Load ingredients
                document.getElementById('ingredientsList').innerHTML = '';
                recipe.ingredients.forEach(ingredient => {
                    addIngredientField(ingredient.name, ingredient.quantity, ingredient.unit);
                });
                
                document.getElementById('addRecipeModal').classList.add('active');
            } catch (error) {
                console.error('Error loading recipe for editing:', error);
            }
        }

        function closeAddRecipeModal() {
            document.getElementById('addRecipeModal').classList.remove('active');
        }

        function addIngredientField(name = '', quantity = '', unit = '') {
            const ingredientsList = document.getElementById('ingredientsList');
            const fieldDiv = document.createElement('div');
            fieldDiv.className = 'flex space-x-2';
            fieldDiv.innerHTML = `
                <input type="text" placeholder="Name" value="${name}" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent ingredient-name">
                <input type="text" placeholder="Quantity" value="${quantity}" class="w-24 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent ingredient-quantity">
                <input type="text" placeholder="Unit" value="${unit}" class="w-24 px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500 focus:border-transparent ingredient-unit">
                <button type="button" onclick="this.parentElement.remove()" class="text-red-500 hover:text-red-700">
                    <i class="fas fa-trash"></i>
                </button>
            `;
            ingredientsList.appendChild(fieldDiv);
        }

        async function handleRecipeSubmit(e) {
            e.preventDefault();
            
            const ingredients = [];
            document.querySelectorAll('#ingredientsList > div').forEach(field => {
                const name = field.querySelector('.ingredient-name').value.trim();
                const quantity = field.querySelector('.ingredient-quantity').value.trim();
                const unit = field.querySelector('.ingredient-unit').value.trim();
                
                if (name) {
                    ingredients.push({ name, quantity, unit });
                }
            });
            
            const recipeData = {
                title: document.getElementById('recipeTitle').value,
                description: document.getElementById('recipeDescription').value,
                prep_time: document.getElementById('prepTime').value,
                cook_time: document.getElementById('cookTime').value,
                servings: parseInt(document.getElementById('servings').value),
                difficulty: document.getElementById('difficulty').value,
                instructions: document.getElementById('instructions').value,
                ingredients: ingredients
            };
            
            try {
                const url = currentEditingRecipe ? `/api/recipes/${currentEditingRecipe.id}` : '/api/recipes';
                const method = currentEditingRecipe ? 'PUT' : 'POST';
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(recipeData)
                });
                
                if (response.ok) {
                    closeAddRecipeModal();
                    loadRecipes();
                } else {
                    console.error('Error saving recipe');
                }
            } catch (error) {
                console.error('Error saving recipe:', error);
            }
        }

        async function deleteRecipe(recipeId) {
            if (confirm('Are you sure you want to delete this recipe?')) {
                try {
                    const response = await fetch(`/api/recipes/${recipeId}`, {
                        method: 'DELETE'
                    });
                    
                    if (response.ok) {
                        loadRecipes();
                    } else {
                        console.error('Error deleting recipe');
                    }
                } catch (error) {
                    console.error('Error deleting recipe:', error);
                }
            }
        }
    </script>
</body>
</html>
